name: miangpay
description: MiangPay - Application mobile panafricaine de transfert d'argent multi-pays.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  local_auth: ^2.2.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
