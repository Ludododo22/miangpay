name: Frontend Flutter

on:
  pull_request:
    paths:
      - 'frontend/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Analyze
        working-directory: frontend
        run: flutter analyze
